<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Playfair+Display:wght@600;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <!-- Style Sheets -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- AMBIENT FX LAYERS -->
    <div id="fx-petals"></div>
    <div id="fx-fireflies"></div>
    <div id="fx-trail"></div>
    <div id="fx-confetti"></div>
    <div id="cursor-glow"></div>

    <!-- MUSIC PLAYER -->
    <div id="music-player" class="glass">
        <button id="music-toggle">🎵</button>
        <div class="music-bars">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <!-- HERO SECTION -->
    <header id="hero">
        <div class="hero-glow"></div>
        <p class="eyebrow">Welcome to Our World</p>
        <h1 class="hero-name">Our Journey</h1>
        <div class="hero-typewriter"><span id="typewriter-text"></span><span class="cursor-blink">|</span></div>
        
        <div class="nickname-cloud">
            <span>Beautiful Moments</span>
            <span>Endless Laughs</span>
            <span>Unforgettable Days</span>
            <span>Together Forever</span>
        </div>

        <div class="hero-date glass">
            <span class="crown">👑</span> Celebrated <span class="gold-text">Always</span>
        </div>

        <a href="#memories-section" class="scroll-cue" id="explore-trigger">
            Explore Memories
            <span></span>
        </a>
    </header>

    <!-- MAIN LOCKED CONTENT GATE -->
    <main id="locked-content" class="unlocked">
        
        <!-- =========================================================
             OUR MEMORIES SECTION (Kinetic Cascade Stage)
        ========================================================= -->
        <section id="memories-section" class="section">
            <h2 class="section-title">Our Precious Memories</h2>
            
            <!-- JavaScript automatic gravity explosion builds here -->
            <div id="memory-cascade-stage"></div>
        </section>

    </main>

    <!-- SITE FOOTER -->
    <footer id="site-footer">
        <p>Made with love for special moments</p>
        <div class="footer-signature">Forever & Always</div>
    </footer>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
